url: https://red-list-ecosystem.github.io/redlistr/
template:
  bootstrap: 5
  bslib:
    fg: "#00183a"
    bg: "#fdfdff"
    primary: "#c50000"

articles:
- title: Examples for ecosystems
  contents:
