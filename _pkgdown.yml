       - text: "Species"
         icon: fa-leaf
       - text: "Metrics for RLTS"
         href: articles/species-vignette.html
       - text: "More documentation"
         icon: fa-book
       - text: "All articles"
         href: articles/index.html

home:
  sidebar:
    structure: [authors, license, community]
